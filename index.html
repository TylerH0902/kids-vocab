<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Word Play 词语游戏</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#fff9f0;min-height:100vh;overflow-x:hidden;}

/* ── Header ── */
.header{background:linear-gradient(135deg,#ff6b6b,#ffd93d);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header h1{font-size:1.4rem;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.2);}
.lang-btn{background:rgba(255,255,255,.3);border:2px solid #fff;color:#fff;font-size:.85rem;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:.2s;}
.lang-btn.active{background:#fff;color:#ff6b6b;}

/* ── Setup screen ── */
#setup{max-width:500px;margin:30px auto;padding:20px;}
.setup-title{text-align:center;font-size:1.3rem;font-weight:700;color:#555;margin-bottom:20px;}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.age-grid{grid-template-columns:1fr 1fr 1fr;}
.age-card,.mode-card{border:3px solid #e0e0e0;border-radius:16px;padding:18px 12px;text-align:center;cursor:pointer;transition:.2s;background:#fff;}
.age-card:hover,.mode-card:hover{border-color:#ff6b6b;transform:scale(1.03);}
.age-card.selected,.mode-card.selected{border-color:#ff6b6b;background:#fff5f5;}
.age-card .emoji{font-size:2.2rem;}
.age-card .label{font-size:1rem;font-weight:700;color:#333;margin-top:6px;}
.age-card .sub{font-size:.78rem;color:#888;margin-top:2px;}
.mode-card .emoji{font-size:2rem;}
.mode-card .label{font-size:1rem;font-weight:700;color:#333;margin-top:6px;}
.mode-card .sub{font-size:.78rem;color:#888;margin-top:2px;}
.start-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-size:1.2rem;font-weight:700;border:none;border-radius:16px;cursor:pointer;transition:.2s;box-shadow:0 4px 12px rgba(255,107,107,.4);}
.start-btn:disabled{opacity:.4;cursor:not-allowed;}
.start-btn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(255,107,107,.5);}
.section-label{font-size:.85rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}

/* ── Game screen ── */
#game{display:none;max-width:560px;margin:0 auto;padding:16px;}
.progress-bar-wrap{background:#e0e0e0;border-radius:10px;height:10px;margin-bottom:12px;}
.progress-bar{background:linear-gradient(90deg,#ff6b6b,#ffd93d);height:10px;border-radius:10px;transition:width .4s;}
.progress-text{text-align:center;font-size:.82rem;color:#888;margin-bottom:16px;}

/* ── Picture card (1-3 & 3-4) ── */
#picture-zone{background:#fff;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.1);padding:24px;text-align:center;margin-bottom:20px;transition:.3s;}
#picture-zone.drop-over{box-shadow:0 4px 24px rgba(255,107,107,.5);transform:scale(1.02);}
#picture-zone.correct{background:#e8f8e8;box-shadow:0 4px 20px rgba(80,200,80,.4);}
#picture-zone.wrong{background:#fee8e8;box-shadow:0 4px 20px rgba(255,80,80,.4);}
.big-emoji{font-size:6rem;line-height:1;cursor:pointer;user-select:none;}
.drop-hint{font-size:.8rem;color:#ccc;margin-top:8px;}

/* ── Word choices (drag cards) ── */
#choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.word-card{background:#fff;border:3px solid #e8e8e8;border-radius:16px;padding:14px 10px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:grab;font-size:1.1rem;font-weight:700;color:#333;transition:.2s;user-select:none;touch-action:none;}
.word-card:active{cursor:grabbing;}
.word-card.dragging{opacity:.4;transform:scale(.95);}
.word-card.used{opacity:.25;pointer-events:none;}
.word-card:hover:not(.used){border-color:#ff6b6b;transform:translateY(-3px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.card-speak-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:2px 4px;border-radius:6px;line-height:1;flex-shrink:0;touch-action:manipulation;}
.card-speak-btn:hover{background:#f0f0f0;}

/* ── Quiz card (5-6) ── */
#quiz-zone{background:#fff;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.1);padding:24px;text-align:center;margin-bottom:20px;}
.quiz-word{font-size:2.4rem;font-weight:700;color:#333;margin-bottom:6px;}
.quiz-audio-btn{background:none;border:none;font-size:1.6rem;cursor:pointer;padding:4px 8px;border-radius:50%;transition:.15s;}
.quiz-audio-btn:hover{background:#f0f0f0;}
#quiz-choices{display:grid;grid-template-columns:1fr;gap:10px;margin-top:16px;}
.quiz-opt{background:#f8f8f8;border:3px solid #e8e8e8;border-radius:14px;padding:14px 16px;text-align:left;cursor:pointer;font-size:1rem;color:#333;transition:.2s;line-height:1.4;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.quiz-opt-text{flex:1;}
.quiz-opt-speak{background:none;border:none;font-size:1rem;cursor:pointer;padding:2px 6px;border-radius:6px;flex-shrink:0;touch-action:manipulation;color:#aaa;}
.quiz-opt-speak:hover{background:#e8e8e8;color:#555;}
.quiz-opt:hover:not(.locked){border-color:#ff6b6b;background:#fff5f5;}
.quiz-opt.correct-ans{border-color:#4caf50;background:#e8f5e9;color:#2e7d32;}
.quiz-opt.wrong-ans{border-color:#f44336;background:#ffebee;color:#c62828;}
.quiz-opt.locked{pointer-events:none;}

/* ── Feedback overlay ── */
#feedback{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;flex-direction:column;}
#feedback.show{display:flex;}
.fb-box{background:#fff;border-radius:24px;padding:32px 40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:popIn .25s ease;}
@keyframes popIn{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.fb-emoji{font-size:4rem;}
.fb-msg{font-size:1.3rem;font-weight:700;margin:10px 0 4px;}
.fb-sub{font-size:.9rem;color:#888;}
.fb-next{margin-top:18px;padding:12px 32px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-size:1.1rem;font-weight:700;border:none;border-radius:14px;cursor:pointer;box-shadow:0 3px 10px rgba(255,107,107,.4);}

/* ── Result screen ── */
#result{display:none;max-width:480px;margin:30px auto;padding:24px;text-align:center;}
.result-emoji{font-size:5rem;}
.result-title{font-size:1.8rem;font-weight:700;color:#333;margin:12px 0 6px;}
.result-score{font-size:1.2rem;color:#666;margin-bottom:20px;}
.result-stars{font-size:2.5rem;letter-spacing:4px;}
.result-btn{display:inline-block;margin:8px 6px;padding:12px 28px;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;}
.result-btn.primary{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;box-shadow:0 3px 10px rgba(255,107,107,.4);}
.result-btn.secondary{background:#f0f0f0;color:#555;}
.result-btn:hover{transform:translateY(-2px);}

/* ── Back button ── */
.back-btn{background:none;border:none;font-size:.9rem;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0;margin-bottom:10px;}
.back-btn:hover{color:#ff6b6b;}

/* ── Drag ghost ── */
#drag-ghost{position:fixed;pointer-events:none;z-index:999;transform:translate(-50%,-50%);opacity:.85;font-size:1rem;font-weight:700;background:#fff;border:3px solid #ff6b6b;border-radius:14px;padding:10px 18px;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;display:none;}

/* ── Book quiz section ── */
.section-divider{border:none;border-top:2px dashed #e8e8e8;margin:20px 0;}
.books-label{font-size:.85rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.book-card{display:flex;align-items:center;gap:14px;background:#fff;border:3px solid #e0e0e0;border-radius:16px;padding:14px 16px;cursor:pointer;transition:.2s;margin-bottom:12px;}
.book-card:hover{border-color:#ff6b6b;transform:translateX(4px);}
.book-card .book-emoji{font-size:2.2rem;flex-shrink:0;}
.book-card .book-info .book-title{font-size:1rem;font-weight:700;color:#333;}
.book-card .book-info .book-sub{font-size:.78rem;color:#888;margin-top:2px;}

/* ── Book question ── */
.quiz-question{font-size:1.1rem;font-weight:600;color:#333;line-height:1.5;margin-bottom:4px;text-align:left;}
</style>
</head>
<body>

<!-- Lang toggle -->
<div class="header">
  <h1 id="h-title">🌟 Word Play</h1>
  <div>
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中文</button>
  </div>
</div>

<!-- Setup -->
<div id="setup">
  <div class="setup-title" id="lbl-choose-age">Choose your age group</div>
  <div class="section-label" id="lbl-age-sec">Age</div>
  <div class="card-grid age-grid">
    <div class="age-card" onclick="selectAge('1-3', this)">
      <div class="emoji">👶</div>
      <div class="label">1 – 3</div>
      <div class="sub" id="sub-13">Pictures &amp; Words</div>
    </div>
    <div class="age-card" onclick="selectAge('3-4', this)">
      <div class="emoji">🧒</div>
      <div class="label">3 – 4</div>
      <div class="sub" id="sub-34">Drag to Match</div>
    </div>
    <div class="age-card" onclick="selectAge('5-6', this)">
      <div class="emoji">👦</div>
      <div class="label">5 – 6</div>
      <div class="sub" id="sub-56">Word Quiz</div>
    </div>
  </div>

  <div class="section-label" style="margin-top:4px;" id="lbl-mode-sec">Mode</div>
  <div class="card-grid">
    <div class="mode-card" onclick="selectMode('casual', this)">
      <div class="emoji">🎮</div>
      <div class="label" id="lbl-casual">Casual Play</div>
      <div class="sub" id="sub-casual">Start &amp; stop anytime</div>
    </div>
    <div class="mode-card" onclick="selectMode('test', this)">
      <div class="emoji">📝</div>
      <div class="label" id="lbl-test">Test Mode</div>
      <div class="sub" id="sub-test">20 or 50 words</div>
    </div>
  </div>

  <button class="start-btn" id="start-btn" type="button" disabled onclick="startGame()">▶ Start!</button>

  <hr class="section-divider"/>
  <div class="books-label" id="lbl-books-sec">📚 Book Quiz</div>
  <div class="book-card" onclick="startBookQuiz('alice')">
    <div class="book-emoji">🐇</div>
    <div class="book-info">
      <div class="book-title" id="book-alice-title">Alice in Wonderland</div>
      <div class="book-sub" id="book-alice-sub">Chapters 1–5 · 20 Questions</div>
    </div>
  </div>
</div>

<!-- Game -->
<div id="game">
  <button class="back-btn" onclick="goSetup()">← <span id="lbl-back">Back</span></button>
  <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
  <div class="progress-text" id="prog-text"></div>

  <!-- Young mode (1-3, 3-4) -->
  <div id="young-ui">
    <div id="picture-zone" ondragover="onDropZoneOver(event)" ondragleave="onDropZoneLeave(event)" ondrop="onDrop(event)">
      <div class="big-emoji" id="pic-emoji">🐕</div>
      <div class="drop-hint" id="lbl-drop-hint">Drag the correct word here 👆</div>
    </div>
    <div id="choices"></div>
  </div>

  <!-- Quiz mode (5-6) + Book mode -->
  <div id="quiz-ui" style="display:none">
    <div id="quiz-zone">
      <div class="quiz-word" id="quiz-word"></div>
      <div class="quiz-question" id="quiz-question" style="display:none"></div>
      <button class="quiz-audio-btn" id="quiz-audio-btn" onclick="speakWord()">🔊</button>
      <div id="quiz-choices"></div>
    </div>
  </div>
</div>

<!-- Feedback overlay -->
<div id="feedback">
  <div class="fb-box">
    <div class="fb-emoji" id="fb-emoji"></div>
    <div class="fb-msg" id="fb-msg"></div>
    <div class="fb-sub" id="fb-sub"></div>
    <button class="fb-next" onclick="nextWord()" id="fb-next-btn">Next →</button>
  </div>
</div>

<!-- Result -->
<div id="result">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-score" id="res-score"></div>
  <div class="result-stars" id="res-stars"></div>
  <br/>
  <button class="result-btn primary" onclick="startAgain()">▶ <span id="lbl-play-again">Play Again</span></button>
  <button class="result-btn secondary" onclick="goSetup()">🏠 <span id="lbl-home">Home</span></button>
</div>

<!-- Drag ghost element -->
<div id="drag-ghost"></div>

  const v = T[lang][key];
  return typeof v === 'function' ? v(...args) : (v || T.en[key] || key);
}

  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-zh').classList.toggle('active', l === 'zh');
  applyLang();
  if (currentWord) refreshCurrentUI();
}

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
let ageGroup     = null;
let gameMode     = null;
let gameType     = 'vocab';   // 'vocab' | 'book'
let currentBookId = null;
let wordPool     = [];
let queueIndex   = 0;
let correct      = 0;
let total        = 0;
let currentWord  = null;
let answered     = false;

const TEST_COUNT = { '1-3': 20, '3-4': 20, '5-6': 50 };

function selectAge(g, el) {
  ageGroup = g;
  document.querySelectorAll('.age-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateStartBtn();
}

function selectMode(m, el) {
  gameMode = m;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateStartBtn();
}

function updateStartBtn() {
  document.getElementById('start-btn').disabled = !(ageGroup && gameMode);
}

function goSetup() {
  gameType = 'vocab';
  document.getElementById('setup').style.display  = '';
  document.getElementById('game').style.display   = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('feedback').classList.remove('show');
}

// ══════════════════════════════════════════════════════════════════
// GAME START
// ══════════════════════════════════════════════════════════════════
function startGame() {
  wordPool   = shuffle([...WORDS]);
  queueIndex = 0;
  correct    = 0;
  total      = gameMode === 'test' ? TEST_COUNT[ageGroup] : wordPool.length;
  currentWord = null;

  document.getElementById('setup').style.display  = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('game').style.display   = 'block';
  document.getElementById('feedback').classList.remove('show');

  const isYoung = ageGroup !== '5-6';
  document.getElementById('young-ui').style.display = isYoung ? '' : 'none';
  document.getElementById('quiz-ui').style.display  = isYoung ? 'none' : '';

  showWord();
}

function startBookQuiz(bookId) {
  const book = BOOKS[bookId];
  if (!book) return;
  gameType      = 'book';
  currentBookId = bookId;
  wordPool      = shuffle([...book.questions]);
  queueIndex    = 0;
  correct       = 0;
  total         = wordPool.length;
  currentWord   = null;

  document.getElementById('setup').style.display  = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('game').style.display   = 'block';
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('young-ui').style.display = 'none';
  document.getElementById('quiz-ui').style.display  = 'block';

  showWord();
}

function startAgain() {
  if (gameType === 'book') startBookQuiz(currentBookId);
  else startGame();
}

// ══════════════════════════════════════════════════════════════════
// WORD DISPLAY
// ══════════════════════════════════════════════════════════════════
function showWord() {
  if (queueIndex >= total) { showResult(); return; }
  currentWord = wordPool[queueIndex % wordPool.length];
  answered = false;

  updateProgress();

  if (gameType === 'book')    renderQuiz();
  else if (ageGroup !== '5-6') renderYoung();
  else                         renderQuiz();
}

function updateProgress() {
  const pct = (queueIndex / total) * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent =
    `${queueIndex + 1} / ${total}`;
}

function refreshCurrentUI() {
  if (!currentWord) return;
  if (ageGroup !== '5-6') renderYoung();
  else                    renderQuiz();
}

// ── Young (1-3 / 3-4) ──────────────────────────────────────────
function renderYoung() {
  const w = currentWord;
  document.getElementById('pic-emoji').textContent = w.emoji;
  document.getElementById('lbl-drop-hint').textContent = t('dropHint');
  resetPictureZone();

  const pool   = getDistractors(w, 3);
  const opts   = shuffle([w, ...pool]);
  const box    = document.getElementById('choices');
  box.innerHTML = '';

  opts.forEach(opt => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.dataset.id = opt.id;

    const wordSpan = document.createElement('span');
    wordSpan.textContent = opt[lang];
    card.appendChild(wordSpan);

    const speakBtn = document.createElement('button');
    speakBtn.className = 'card-speak-btn';
    speakBtn.textContent = '🔊';
    speakBtn.addEventListener('click',      e => { e.stopPropagation(); speakText(opt.id); });
    speakBtn.addEventListener('touchstart', e => { e.stopPropagation(); speakText(opt.id); }, {passive:true});
    speakBtn.draggable = false;
    card.appendChild(speakBtn);

    // Desktop drag
    card.draggable = true;
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend',   onDragEnd);

    // Touch drag
    card.addEventListener('touchstart', onTouchStart, {passive:false});
    card.addEventListener('touchmove',  onTouchMove,  {passive:false});
    card.addEventListener('touchend',   onTouchEnd,   {passive:false});

    // Click-to-select
    card.addEventListener('click', () => onCardClick(opt.id));

    box.appendChild(card);
  });
}

function resetPictureZone() {
  const z = document.getElementById('picture-zone');
  z.classList.remove('correct','wrong','drop-over');
}

// ── Quiz (5-6 vocab + book) ────────────────────────────────────
function renderQuiz() {
  const w    = currentWord;
  const box  = document.getElementById('quiz-choices');
  const wordEl = document.getElementById('quiz-word');
  const qEl    = document.getElementById('quiz-question');
  const audioBtn = document.getElementById('quiz-audio-btn');
  box.innerHTML = '';

  if (gameType === 'book') {
    wordEl.style.display  = 'none';
    qEl.style.display     = '';
    audioBtn.style.display = 'none';
    qEl.textContent = lang === 'en' ? w.q_en : w.q_zh;

    shuffle([...w.opts]).forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'quiz-opt';
      btn.dataset.correct = opt.correct ? 'true' : 'false';
      const optText = lang === 'en' ? opt.en : opt.zh;

      const textSpan = document.createElement('span');
      textSpan.className = 'quiz-opt-text';
      textSpan.textContent = optText;

      const speakBtn = document.createElement('button');
      speakBtn.className = 'quiz-opt-speak';
      speakBtn.textContent = '🔊';
      speakBtn.addEventListener('click',      e => { e.stopPropagation(); speakRaw(optText); });
      speakBtn.addEventListener('touchstart', e => { e.stopPropagation(); speakRaw(optText); }, {passive:true});

      btn.appendChild(textSpan);
      btn.appendChild(speakBtn);
      btn.addEventListener('click', () => onQuizClick(btn));
      box.appendChild(btn);
    });
  } else {
    wordEl.style.display  = '';
    qEl.style.display     = 'none';
    audioBtn.style.display = '';
    wordEl.textContent = w[lang];

    const opts = shuffle([w, ...getDistractors(w, 3)]);
    opts.forEach(opt => {
      const btn = document.createElement('div');
      btn.className = 'quiz-opt';
      btn.dataset.id      = opt.id;
      btn.dataset.correct = (opt.id === w.id) ? 'true' : 'false';
      btn.textContent = opt[lang === 'en' ? 'def_en' : 'def_zh'];
      btn.addEventListener('click', () => onQuizClick(btn));
      box.appendChild(btn);
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// INTERACTION — YOUNG
// ══════════════════════════════════════════════════════════════════
let draggingId = null;
let ghost      = document.getElementById('drag-ghost');

// Desktop drag-and-drop
function onDragStart(e) {
  draggingId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.setDragImage(new Image(), 0, 0);
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
}
function onDropZoneOver(e) {
  e.preventDefault();
  document.getElementById('picture-zone').classList.add('drop-over');
}
function onDropZoneLeave() {
  document.getElementById('picture-zone').classList.remove('drop-over');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('picture-zone').classList.remove('drop-over');
  if (draggingId) checkAnswer(draggingId);
}

// Touch drag
let touchCard = null;
function onTouchStart(e) {
  if (answered) return;
  touchCard = e.currentTarget;
  draggingId = touchCard.dataset.id;
  ghost.textContent = touchCard.childNodes[0].textContent.trim();
  ghost.style.display = 'block';
  moveDragGhost(e.touches[0]);
  e.preventDefault();
}
function onTouchMove(e) {
  if (!touchCard) return;
  moveDragGhost(e.touches[0]);
  const pz = document.getElementById('picture-zone');
  const r  = pz.getBoundingClientRect();
  const t  = e.touches[0];
  if (t.clientX >= r.left && t.clientX <= r.right &&
      t.clientY >= r.top  && t.clientY <= r.bottom) {
    pz.classList.add('drop-over');
  } else {
    pz.classList.remove('drop-over');
  }
  e.preventDefault();
}
function onTouchEnd(e) {
  if (!touchCard) return;
  ghost.style.display = 'none';
  const pz = document.getElementById('picture-zone');
  const r  = pz.getBoundingClientRect();
  const t  = e.changedTouches[0];
  pz.classList.remove('drop-over');
  if (t.clientX >= r.left && t.clientX <= r.right &&
      t.clientY >= r.top  && t.clientY <= r.bottom) {
    checkAnswer(draggingId);
  }
  touchCard  = null;
  draggingId = null;
  e.preventDefault();
}
function moveDragGhost(touch) {
  ghost.style.left = touch.clientX + 'px';
  ghost.style.top  = touch.clientY - 30 + 'px';
}

// Click fallback
function onCardClick(id) {
  if (answered) return;
  checkAnswer(id);
}

// ══════════════════════════════════════════════════════════════════
// INTERACTION — QUIZ
// ══════════════════════════════════════════════════════════════════
function onQuizClick(btn) {
  if (answered) return;
  answered = true;
  const isRight = btn.dataset.correct === 'true';
  document.querySelectorAll('.quiz-opt').forEach(o => o.classList.add('locked'));
  if (isRight) btn.classList.add('correct-ans');
  else         btn.classList.add('wrong-ans');
  if (isRight) correct++;
  showFeedback(isRight);
}

// ══════════════════════════════════════════════════════════════════
// ANSWER CHECK (young mode)
// ══════════════════════════════════════════════════════════════════
function checkAnswer(id) {
  if (answered) return;
  answered = true;
  const isRight = id === currentWord.id;
  const zone = document.getElementById('picture-zone');

  zone.classList.add(isRight ? 'correct' : 'wrong');

  document.querySelectorAll('.word-card').forEach(c => c.classList.add('used'));

  if (isRight) correct++;
  showFeedback(isRight);
}

// ══════════════════════════════════════════════════════════════════
// FEEDBACK
// ══════════════════════════════════════════════════════════════════
function showFeedback(isRight) {
  document.getElementById('fb-emoji').textContent = isRight ? '🌟' : '😊';
  document.getElementById('fb-msg').textContent   = t(isRight ? 'correct' : 'wrong');
  if (gameType === 'book') {
    document.getElementById('fb-sub').textContent = '';
  } else {
    document.getElementById('fb-sub').textContent = t(isRight ? 'correctSub' : 'wrongSub', currentWord[lang]);
  }
  document.getElementById('fb-next-btn').textContent = t('next');
  document.getElementById('feedback').classList.add('show');
}

function nextWord() {
  document.getElementById('feedback').classList.remove('show');
  queueIndex++;
  showWord();
}

// ══════════════════════════════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════════════════════════════
function showResult() {
  document.getElementById('game').style.display   = 'none';
  document.getElementById('result').style.display = 'block';

  const pct = total > 0 ? correct / total : 0;
  const stars = pct >= 0.9 ? '⭐⭐⭐' : pct >= 0.7 ? '⭐⭐' : '⭐';
  const emoji = pct >= 0.9 ? '🏆' : pct >= 0.7 ? '🎉' : '😊';

  document.getElementById('res-emoji').textContent  = emoji;
  const titleKey = gameType === 'book' ? 'bookDone' : (gameMode === 'test' ? 'testDone' : 'casualDone');
  document.getElementById('res-title').textContent  = t(titleKey);
  document.getElementById('res-score').textContent  = t('scored', correct, total);
  document.getElementById('res-stars').textContent  = stars;
  document.getElementById('lbl-play-again').textContent = t('playAgain');
  document.getElementById('lbl-home').textContent   = t('home');
}

// ══════════════════════════════════════════════════════════════════
// AUDIO — Web Speech API
// ══════════════════════════════════════════════════════════════════
let _audio = null;

function speakRaw(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'en' ? 'en-US' : 'zh-CN';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function speakText(wordId) {
  const src = `audio/${lang}/${wordId}.mp3`;
  if (_audio) { _audio.pause(); _audio = null; }
  _audio = new Audio(src);
  _audio.play().catch(() => {});
}

function speakWord() {
  if (!currentWord) return;
  speakText(currentWord.id);
}

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getDistractors(word, n) {
  // Prefer same category first, then any
  const sameCat = WORDS.filter(w => w.id !== word.id && w.cat === word.cat);
  const other   = WORDS.filter(w => w.id !== word.id && w.cat !== word.cat);
  const pool    = shuffle([...sameCat, ...other]);
  return pool.slice(0, n);
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
applyLang();
</script>
